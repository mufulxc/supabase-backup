name: Supabase 数据库备份

on:
  schedule:
    # 每天北京时间上午 10 点（UTC 2:00）
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 PostgreSQL 17 客户端
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: 执行备份
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          DATE=$(date +%Y-%m-%d)
          DIR="backups/${DATE}"
          mkdir -p "${DIR}"

          # 角色与权限
          pg_dumpall \
            --dbname="${DB_URL}" \
            --roles-only \
            --no-role-passwords \
            --no-owner \
            --no-acl \
            > "${DIR}/roles.sql" 2>/dev/null || echo "-- 无角色变更" > "${DIR}/roles.sql"

          # 表结构
          pg_dump \
            --dbname="${DB_URL}" \
            --schema-only \
            --no-owner \
            --no-acl \
            > "${DIR}/schema.sql"

          # 数据
          pg_dump \
            --dbname="${DB_URL}" \
            --data-only \
            --no-owner \
            --no-acl \
            > "${DIR}/data.sql"

          echo "备份完成: ${DIR}"
          echo "  roles.sql  : $(wc -c < ${DIR}/roles.sql) bytes"
          echo "  schema.sql : $(wc -c < ${DIR}/schema.sql) bytes"
          echo "  data.sql   : $(wc -c < ${DIR}/data.sql) bytes"

      - name: 清理 7 天前的旧备份
        run: |
          find backups/ -maxdepth 1 -type d -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
          echo "当前保留备份:"
          ls -1 backups/ | grep -v '^\.'

      - name: 提交备份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add backups/
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "备份 $(date +%Y-%m-%d)"
            git push
            echo "已提交并推送"
          fi
